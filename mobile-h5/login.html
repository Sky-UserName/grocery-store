<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问验证</title>
    <link rel="stylesheet" href="assets/css/mobile.css">
</head>
<body class="password-page">
    <div class="password-bg"></div>
    <main class="password-main">
        <section>
            <h1 class="store-title" id="siteName"></h1>
            <p class="store-subtitle" id="subtitle"></p>
            <p class="store-description" id="description"></p>
        </section>
        <div class="lock-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
                <rect x="5" y="10" width="14" height="10" rx="2"></rect>
                <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
                <path d="M12 14v2"></path>
            </svg>
        </div>
        <h2 class="password-title">请输入访问密码</h2>
        <div class="code-row" id="codeRow">
            <div class="code-box active"></div><div class="code-box"></div><div class="code-box"></div>
            <div class="code-box"></div><div class="code-box"></div><div class="code-box"></div>
            <button class="eye-btn" type="button" id="toggleVisible">显示</button>
        </div>
        <div class="keypad" id="keypad">
            <button class="num-btn" type="button" data-num="1">1</button><button class="num-btn" type="button" data-num="2">2</button><button class="num-btn" type="button" data-num="3">3</button>
            <button class="num-btn" type="button" data-num="4">4</button><button class="num-btn" type="button" data-num="5">5</button><button class="num-btn" type="button" data-num="6">6</button>
            <button class="num-btn" type="button" data-num="7">7</button><button class="num-btn" type="button" data-num="8">8</button><button class="num-btn" type="button" data-num="9">9</button>
            <span></span><button class="num-btn" type="button" data-num="0">0</button><button class="delete-btn" type="button" id="deleteNum">⌫</button>
        </div>
        <button class="primary-action" type="button" id="confirmBtn">确认进入</button>
        <div class="error-text" id="errorText"></div>
    </main>
    <script src="js/mobile.js"></script>
    <script>
        if (!window.__WECHAT_BROWSER_GUIDE_ACTIVE__) {
        const digits = [];
        let visible = false;
        const boxes = [...document.querySelectorAll(".code-box")];
        const row = document.getElementById("codeRow");
        const errorText = document.getElementById("errorText");

        function renderCode() {
            boxes.forEach((box, index) => {
                box.classList.toggle("filled", index < digits.length);
                box.classList.toggle("active", index === digits.length && digits.length < boxes.length);
                box.textContent = index < digits.length ? (visible ? digits[index] : "●") : "";
            });
        }

        function showError(message) {
            errorText.textContent = message;
            row.classList.add("shake");
            setTimeout(() => row.classList.remove("shake"), 500);
        }

        document.getElementById("keypad").addEventListener("click", event => {
            const num = event.target.dataset.num;
            if (!num || digits.length >= 6) return;
            digits.push(num);
            errorText.textContent = "";
            renderCode();
        });
        document.getElementById("deleteNum").addEventListener("click", () => {
            digits.pop();
            renderCode();
        });
        document.getElementById("toggleVisible").addEventListener("click", event => {
            visible = !visible;
            event.target.textContent = visible ? "隐藏" : "显示";
            renderCode();
        });
        document.getElementById("confirmBtn").addEventListener("click", async () => {
            if (digits.length < 6) {
                showError("请输入完整 6 位密码");
                return;
            }
            const response = await fetch(apiUrl("/api/mobile/access/verify"), {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password: digits.join("") })
            });
            if (!response.ok) {
                showError("密码错误，请重新输入");
                digits.splice(0, digits.length);
                renderCode();
                return;
            }
            const result = await response.json();
            mobileStore.token = result.token;
            location.href = "index.html";
        });

        getConfig().then(config => {
            setText("siteName", config.siteName);
            setText("subtitle", config.siteSubtitle);
            setText("description", config.siteDescription);
            if (!config.accessPasswordEnabled) location.href = "index.html";
        });
        renderCode();
        }
    </script>
</body>
</html>
