<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类卡片</title>
    <link rel="stylesheet" href="/mobile/css/mobile.css">
</head>
<body class="dark-page">
    <header class="mobile-header" id="siteName">梦梦杂货铺</header>
    <main class="list-layout">
        <aside class="category-nav" id="categoryNav"></aside>
        <section class="card-area">
            <div class="card-grid" id="cardGrid"></div>
            <div class="empty-state" id="emptyState" hidden>暂无内容</div>
        </section>
    </main>
    <script src="/mobile/js/mobile.js"></script>
    <script>
        let activeCategory = '';
        let categories = [];

        async function ensureAccess(config) {
            if (config.accessPasswordEnabled && !mobileStore.token) {
                location.href = '/mobile/login.html';
                return false;
            }
            return true;
        }

        function renderCategories() {
            const nav = document.getElementById('categoryNav');
            nav.innerHTML = [
                `<div class="category-item ${activeCategory === '' ? 'active' : ''}" data-id="">全部</div>`,
                ...categories.map(category => `<div class="category-item ${String(category.id) === String(activeCategory) ? 'active' : ''}" data-id="${category.id}">${escapeHtml(category.name)}</div>`)
            ].join('');
        }

        async function loadCards() {
            const query = activeCategory ? `?categoryId=${activeCategory}` : '';
            const cards = await apiGet(`/api/mobile/cards${query}`);
            if (!cards) return;

            const grid = document.getElementById('cardGrid');
            const empty = document.getElementById('emptyState');
            empty.hidden = cards.length > 0;
            grid.innerHTML = cards.map(card => `
                <article class="product-card" data-id="${card.id}">
                    <img src="${card.coverImageUrl || ''}" alt="${escapeHtml(card.title)}">
                    <h2>${escapeHtml(card.title)}</h2>
                    <p>${escapeHtml(card.summary)}</p>
                </article>
            `).join('');
        }

        document.getElementById('categoryNav').addEventListener('click', event => {
            const item = event.target.closest('.category-item');
            if (!item) return;
            activeCategory = item.dataset.id;
            renderCategories();
            loadCards();
        });

        document.getElementById('cardGrid').addEventListener('click', event => {
            const card = event.target.closest('.product-card');
            if (!card) return;
            location.href = `/mobile/detail.html?id=${card.dataset.id}`;
        });

        (async function init() {
            const config = await getConfig();
            setText('siteName', config.siteName);
            if (!await ensureAccess(config)) return;
            categories = await apiGet('/api/mobile/categories') || [];
            renderCategories();
            await loadCards();
        })();
    </script>
</body>
</html>
