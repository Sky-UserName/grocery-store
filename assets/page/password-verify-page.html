  <script id="inputNumber">
function inputNumber(event) {
    const num = event.currentTarget.dataset.num;
    const currentLength = document.querySelectorAll('#code-0 .dot.block').length;
    if (currentLength >= 6) return;
    
    const codeBox = document.getElementById(`code-${currentLength}`);
    codeBox.querySelector('.dot').classList.add('block');
    codeBox.querySelector('.dot').classList.remove('hidden');
    codeBox.querySelector('.number').textContent = num;
    codeBox.querySelector('.number').classList.add('block');
    codeBox.querySelector('.number').classList.remove('hidden');
    codeBox.classList.remove('border-border');
    codeBox.classList.add('border-primary', 'bg-primary');
    codeBox.querySelector('.dot').classList.add('text-white');
    
    if (currentLength < 5) {
        const nextBox = document.getElementById(`code-${currentLength + 1}`);
        nextBox.classList.remove('border-border');
        nextBox.classList.add('border-primary');
    }
    
    document.getElementById('error-text').classList.add('hidden');
}
</script> 
  <script id="deleteNumber">
function deleteNumber(event) {
    const currentLength = document.querySelectorAll('#code-0 .dot.block').length;
    if (currentLength === 0) return;
    const index = currentLength - 1;
    const codeBox = document.getElementById(`code-${index}`);
    
    codeBox.querySelector('.dot').classList.remove('block');
    codeBox.querySelector('.dot').classList.add('hidden');
    codeBox.querySelector('.number').textContent = '';
    codeBox.querySelector('.number').classList.remove('block');
    codeBox.querySelector('.number').classList.add('hidden');
    codeBox.classList.remove('border-primary', 'bg-primary');
    codeBox.querySelector('.dot').classList.remove('text-white');
    codeBox.classList.add('border-border');
    
    if (index < 5) {
        const nextBox = document.getElementById(`code-${index + 1}`);
        nextBox.classList.remove('border-primary');
        nextBox.classList.add('border-border');
    }
    
    document.getElementById('error-text').classList.add('hidden');
}
</script> 
  <script id="togglePasswordVisibility">
function togglePasswordVisibility(event) {
    const eyeIcon = document.getElementById('eye-icon');
    const isEye = eyeIcon.classList.contains('fa-eye');
    
    if (isEye) {
        eyeIcon.classList.remove('fa-eye');
        eyeIcon.classList.add('fa-eye-slash');
        document.querySelectorAll('.number').forEach(el => {
            el.classList.remove('hidden');
            el.classList.add('block');
        });
        document.querySelectorAll('.dot').forEach(el => {
            el.classList.remove('block');
            el.classList.add('hidden');
        });
    } else {
        eyeIcon.classList.remove('fa-eye-slash');
        eyeIcon.classList.add('fa-eye');
        document.querySelectorAll('.number').forEach(el => {
            el.classList.add('hidden');
            el.classList.remove('block');
        });
        document.querySelectorAll('.dot').forEach(el => {
            if (el.textContent !== '') {
                el.classList.remove('hidden');
                el.classList.add('block');
            }
        });
    }
}
</script> 
  <script id="verifyPassword">
function verifyPassword(event) {
    let password = '';
    for (let i = 0; i < 6; i++) {
        const num = document.getElementById(`code-${i}`).querySelector('.number').textContent;
        password += num;
    }
    
    const container = document.getElementById('password-container');
    const errorText = document.getElementById('error-text');
    
    if (password.length < 6) {
        errorText.textContent = '请输入完整6位密码';
        errorText.classList.remove('hidden');
        container.classList.add('shake');
        setTimeout(() => {
            container.classList.remove('shake');
        }, 500);
        return;
    }
    
    // 正确密码为8888，需求允许前四位即可或者完整四位？按照需求描述正确密码是8888
    if (password.startsWith('8888') || password === '8888') {
        // 密码正确，后续跳转由框架处理
        window.location.href = 'javascript:void(0);';
    } else {
        errorText.textContent = '密码错误，请重新输入';
        errorText.classList.remove('hidden');
        container.classList.add('shake');
        setTimeout(() => {
            container.classList.remove('shake');
        }, 500);
    }
}
</script>
