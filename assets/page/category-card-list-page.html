  <script id="filterProductsByCategory">
      function filterProductsByCategory(event) {
        const clickedItem = event.currentTarget;
        const clickedCategory = clickedItem.getAttribute('data-category');
        const allItems = document.querySelectorAll('.category-item');
        const allCards = document.querySelectorAll('.product-card');
        allItems.forEach(item => {
          item.classList.remove('active');
        });
        clickedItem.classList.add('active');
        allCards.forEach(card => {
          const cardCategory = card.getAttribute('data-category');
          if (clickedCategory === 'all' || clickedCategory === cardCategory) {
            card.classList.remove('hidden');
          } else {
            card.classList.add('hidden');
          }
        });
      }
    </script> 
  <script id="productCardPress">
      function productCardPress(event) {
        event.currentTarget.classList.add('scale-95');
      }
    </script> 
  <script id="productCardRelease">
      function productCardRelease(event) {
        event.currentTarget.classList.remove('scale-95');
      }
    </script> 
  <script>

window.onload = function(){
        try {
          //为.category-item元素添加点击事件监听器
          [...document.querySelectorAll('.category-item')].forEach(function(item){
            item.addEventListener('click',function(event){
               filterProductsByCategory(event);
            })
          })
        } catch (e) {
          console.error('JsHandle error:', e);
        }
        try {
          //为.product-card元素添加点击事件监听器

            item.addEventListener('mousedown',function(event){

};
