<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理端登录</title>
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body class="login-page">
    <main class="login-shell">
        <form class="login-panel" id="loginForm">
            <div class="login-heading">
                <span class="login-mark">铺</span>
                <div>
                    <h1>杂货铺 H5 管理端</h1>
                    <p>使用管理员账号登录</p>
                </div>
            </div>
            <div class="field">
                <label>账号</label>
                <input class="input" name="username" value="admin" autocomplete="username" required>
            </div>
            <div class="field">
                <label>密码</label>
                <input class="input" name="password" type="password" autocomplete="current-password" required autofocus>
            </div>
            <div class="login-error" id="loginError" role="alert"></div>
            <button class="btn block" type="submit">登录</button>
            <p class="login-tip">默认账号：admin，默认密码：Admin@123456</p>
        </form>
    </main>
    <script src="assets/js/admin-login.js"></script>
</body>
</html>
