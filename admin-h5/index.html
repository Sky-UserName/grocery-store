<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杂货铺 H5 管理端</title>
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <h1>杂货铺 H5 管理端</h1>
            <a href="http://localhost:5100/login.html" target="_blank">预览</a>
        </header>

        <section class="page active" data-page="home">
            <div class="metric-grid">
                <div class="metric"><strong id="categoryCount">0</strong><span>分类</span></div>
                <div class="metric"><strong id="cardCount">0</strong><span>卡片</span></div>
                <div class="metric"><strong id="publishedCount">0</strong><span>发布</span></div>
            </div>
            <h2 class="section-title">移动端入口</h2>
            <div class="card">
                <a class="preview-frame" id="mobileLink" href="../mobile/login.html" target="_blank"></a>
                <div class="actions">
                    <button class="btn" data-go="qrcode">生成二维码</button>
                    <button class="btn secondary" id="resetDemo">重置演示数据</button>
                </div>
            </div>
        </section>

        <section class="page" data-page="config">
            <form class="card" id="configForm">
                <div class="field"><label>店铺名称</label><input class="input" name="siteName"></div>
                <div class="field"><label>副标题</label><input class="input" name="subtitle"></div>
                <div class="field"><label>说明文案</label><textarea class="textarea" name="description"></textarea></div>
                <div class="field"><label>全站访问密码</label><input class="input" name="accessPassword" maxlength="12"></div>
                <div class="field"><label>原后台密码</label><input class="input" name="currentPassword" type="password" autocomplete="current-password" placeholder="不改密码可留空"></div>
                <div class="row">
                    <div class="field"><label>新后台密码</label><input class="input" name="newAdminPassword" type="password" autocomplete="new-password" maxlength="24"></div>
                    <div class="field"><label>确认新密码</label><input class="input" name="confirmAdminPassword" type="password" autocomplete="new-password" maxlength="24"></div>
                </div>
                <div class="field">
                    <label><input type="checkbox" name="passwordEnabled"> 启用移动端访问密码</label>
                </div>
                <button class="btn block" type="submit">保存配置</button>
            </form>
        </section>

        <section class="page" data-page="categories">
            <button class="btn block" id="newCategory">新增分类</button>
            <h2 class="section-title">分类列表</h2>
            <div class="list" id="categoryList"></div>
        </section>

        <section class="page" data-page="cards">
            <button class="btn block" id="newCard">新增卡片</button>
            <h2 class="section-title">卡片列表</h2>
            <div class="list" id="cardList"></div>
        </section>

        <section class="page" data-page="qrcode">
            <div class="card">
                <div class="field"><label>分享链接</label><input class="input" id="qrText"></div>
                <button class="btn block" id="makeQr">生成二维码</button>
            </div>
            <div class="qr-box" id="qrBox"></div>
        </section>

        <nav class="bottom-nav">
            <button class="active" data-nav="home">首页</button>
            <button data-nav="config">配置</button>
            <button data-nav="categories">分类</button>
            <button data-nav="cards">卡片</button>
            <button data-nav="qrcode">二维码</button>
        </nav>
    </div>

    <div class="modal" id="loginModal">
        <form class="modal-panel" id="loginForm">
            <h2 class="section-title">管理端登录</h2>
            <div class="field"><label>账号</label><input class="input" name="username" value="admin" autocomplete="username"></div>
            <div class="field"><label>密码</label><input class="input" name="password" type="password" autocomplete="current-password"></div>
            <button class="btn block" type="submit">登录</button>
        </form>
    </div>

    <div class="modal" id="categoryModal">
        <form class="modal-panel" id="categoryForm">
            <h2 class="section-title">分类编辑</h2>
            <input type="hidden" name="id">
            <div class="field"><label>分类名称</label><input class="input" name="name" required></div>
                <div class="field"><label>分类标识</label><input class="input" name="slug"></div>
            <div class="field"><label>排序</label><input class="input" name="sort" type="number"></div>
            <div class="field"><label><input type="checkbox" name="enabled"> 启用</label></div>
            <div class="row"><button class="btn secondary" type="button" data-close="categoryModal">取消</button><button class="btn" type="submit">保存</button></div>
        </form>
    </div>

    <div class="modal" id="cardModal">
        <form class="modal-panel" id="cardForm">
            <h2 class="section-title">卡片编辑</h2>
            <input type="hidden" name="id">
            <input type="hidden" name="cover">
            <div class="row">
                <div class="field"><label>分类</label><select class="select" name="categoryId"></select></div>
                <div class="field"><label>状态</label><select class="select" name="status"><option value="0">草稿</option><option value="1">已发布</option><option value="2">隐藏</option></select></div>
            </div>
            <div class="field"><label>标题</label><input class="input" name="title" required></div>
            <div class="field"><label>简介</label><input class="input" name="summary" required></div>
            <div class="row">
                <div class="field"><label>排序</label><input class="input" name="sort" type="number"></div>
                <div class="field"><label>标签</label><input class="input" name="tags" placeholder="逗号分隔"></div>
            </div>
            <div class="field">
                <label>封面图</label>
                <div class="row">
                    <img class="cover-preview" id="coverPreview" alt="">
                    <input class="input" id="coverFile" type="file" accept="image/*">
                </div>
            </div>
            <div class="field">
                <label>富文本内容</label>
                <div class="editor-toolbar">
                    <button type="button" data-command="bold">加粗</button>
                    <button type="button" data-command="insertUnorderedList">列表</button>
                    <button type="button" id="insertLink">链接</button>
                    <label>插图<input id="contentImage" type="file" accept="image/*" hidden></label>
                </div>
                <div class="rich-editor" id="richEditor" contenteditable="true"></div>
            </div>
            <div class="row"><button class="btn secondary" type="button" data-close="cardModal">取消</button><button class="btn" type="submit">保存</button></div>
        </form>
    </div>

    <script src="assets/js/admin-api.js"></script>
</body>
</html>
